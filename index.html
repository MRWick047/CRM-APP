<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR Auto CRM</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-logo">🚗</div>
      <h1>SR <span>Auto</span> CRM</h1>
      <p>SR Group MMC — Azerbaijan</p>
    </div>
    <div class="alert alert-danger" id="authErr"></div>
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="form-group"><label>Email</label><input class="form-control" type="email" id="liEmail" placeholder="you@srgroup.az" required autocomplete="email"></div>
      <div class="form-group"><label>Şifrə / Пароль</label><input class="form-control" type="password" id="liPass" required autocomplete="current-password"></div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px">Daxil ol / Войти</button>
    </form>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="appScreen" class="hidden">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">🚗</div>
      <div>
        <div class="sb-brand-name">SR <span>Auto</span></div>
        <div class="sb-brand-sub">CRM System</div>
      </div>
    </div>
    <nav class="sb-nav">
      <div class="nav-section">
        <div class="nav-label" id="nl-main">Əsas</div>
        <button class="nav-item active" id="nav_dashboard" data-page="dashboard" onclick="navigate('dashboard')"><span class="ni">📊</span><span data-i="dashboard">İdarə paneli</span></button>
        <button class="nav-item hidden" id="nav_visits" data-page="visits" onclick="navigate('visits')"><span class="ni">🚗</span><span data-i="visits">Ziyarətlər</span></button>
        <button class="nav-item hidden" id="nav_sales" data-page="sales" onclick="navigate('sales')"><span class="ni">💰</span><span data-i="sales">Satış</span></button>
        <button class="nav-item hidden" id="nav_calls" data-page="calls" onclick="navigate('calls')"><span class="ni">📞</span><span data-i="calls">Zənglər</span></button>
      </div>
      <div class="nav-section">
        <div class="nav-label" id="nl-mgmt">İdarəetmə</div>
        <button class="nav-item hidden" id="nav_clients" data-page="clients" onclick="navigate('clients')"><span class="ni">👥</span><span data-i="clients">Müştərilər</span></button>
        <button class="nav-item hidden" id="nav_deals" data-page="deals" onclick="navigate('deals')"><span class="ni">💼</span><span data-i="deals">Sövdələşmələr</span></button>
        <button class="nav-item hidden" id="nav_tasks" data-page="tasks" onclick="navigate('tasks')"><span class="ni">✅</span><span data-i="tasks">Tapşırıqlar</span><span class="nav-badge hidden" id="taskBadge">0</span></button>
        <button class="nav-item hidden" id="nav_employees" data-page="employees" onclick="navigate('employees')"><span class="ni">🏢</span><span data-i="employees">İşçilər</span></button>
        <button class="nav-item hidden" id="nav_documents" data-page="documents" onclick="navigate('documents')"><span class="ni">📄</span><span data-i="documents">Sənədlər</span></button>
        <button class="nav-item hidden" id="nav_reports" data-page="reports" onclick="navigate('reports')"><span class="ni">📈</span><span data-i="reports">Hesabatlar</span></button>
        <button class="nav-item hidden" id="nav_admin" data-page="admin" onclick="navigate('admin')"><span class="ni">⚙️</span><span data-i="admin">Administrasiya</span></button>
      </div>
    </nav>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar" id="sbAvatar">?</div>
        <div style="flex:1;min-width:0">
          <div class="sb-user-name" id="sbName">—</div>
          <div class="sb-user-role" id="sbRole">—</div>
        </div>
      </div>
      <button class="nav-item" onclick="logout()" style="margin-top:4px"><span class="ni">↪</span><span data-i="logout">Çıxış</span></button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-area">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-ghost btn-icon" id="menuBtn" onclick="toggleSidebar()" style="display:none">☰</button>
        <h1 class="page-title" id="pageTitle">İdarə paneli</h1>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()">🌙</button>
        <div class="lang-toggle">
          <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
          <button class="lang-btn active" data-lang="az" onclick="setLang('az')">AZ</button>
        </div>
      </div>
    </header>
    <main class="content" id="pageContent"></main>
  </div>
</div>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal" id="mainModal">
    <div class="modal-head">
      <h3 class="modal-title" id="modalTitle"></h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<!-- ══ CONFIRM ══ -->
<div class="modal-overlay" id="confirmOverlay" onclick="confirmOverlayClick(event)">
  <div class="modal" style="max-width:380px">
    <div class="modal-head">
      <h3 class="modal-title" id="confirmTitle">Təsdiq</h3>
      <button class="modal-close" onclick="closeConfirm()">✕</button>
    </div>
    <div class="modal-body"><p id="confirmText" style="color:var(--muted);font-size:14px;line-height:1.6"></p></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeConfirm()" id="confirmCancelBtn">İmtina</button>
      <button class="btn btn-danger" id="confirmOkBtn">Sil</button>
    </div>
  </div>
</div>

<!-- ══ TOASTS ══ -->
<div class="toast-wrap" id="toastWrap"></div>

<script src="assets/js/backend/storage.service.js" defer></script>
<script src="assets/js/backend/auth.service.js" defer></script>
<script src="assets/js/backend/crm.service.js" defer></script>
<script src="assets/js/frontend/ui.service.js" defer></script>
<script src="assets/js/app/app.js" defer></script>
</body>
</html>
